site_name: PeerCache
site_description: Peer-to-peer RDMA zero-copy L3 KV-cache backend for SGLang HiCache
site_url: https://flymysql.github.io/PeerCache/
repo_url: https://github.com/flymysql/PeerCache
repo_name: flymysql/PeerCache
edit_uri: edit/main/docs/

theme:
  name: material
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
  features:
    - navigation.sections
    - navigation.top
    - navigation.tracking
    - content.code.copy
    - content.code.annotate
    - toc.follow

nav:
  - Home: index.md
  - Getting Started: getting-started.md
  - Positioning & Comparison: positioning.md
  - Architecture: architecture.md
  - SDK Reference: sdk.md
  - Benchmarks: benchmarks.md
  - Performance Baseline: performance.md
  - Changelog: changelog.md

markdown_extensions:
  - admonition
  - md_in_html
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - tables
  - toc:
      permalink: true

plugins:
  - search
  - i18n:
      docs_structure: suffix
      languages:
        - locale: en
          default: true
          name: English
          build: true
        - locale: zh
          name: 中文
          build: true
          nav_translations:
            Home: 首页
            Getting Started: 快速开始
            Positioning & Comparison: 定位与对比
            Architecture: 架构
            SDK Reference: SDK 参考
            Benchmarks: 性能基准测试
            Performance Baseline: 性能基线
            Changelog: 更新日志

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/flymysql/PeerCache
