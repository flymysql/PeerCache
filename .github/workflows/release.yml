name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write   # create the GitHub Release

jobs:
  build-sdist:
    name: Build source distribution
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Build sdist
        run: |
          python -m pip install --upgrade pip build
          python -m build --sdist
      - name: Check metadata
        run: |
          python -m pip install twine
          python -m twine check dist/*
      - uses: actions/upload-artifact@v4
        with:
          name: sdist
          path: dist/*.tar.gz

  github-release:
    name: Publish GitHub Release
    needs: build-sdist
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: sdist
          path: dist
      - name: Create release and attach the package
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.tar.gz
          generate_release_notes: true

  pypi-publish:
    name: Publish to PyPI (trusted publishing)
    needs: build-sdist
    runs-on: ubuntu-latest
    # Requires a PyPI Trusted Publisher for this repo/workflow:
    # PyPI project -> Publishing -> add GitHub publisher: flymysql/PeerCache,
    # workflow release.yml, environment pypi. skip-existing avoids failures when
    # re-running a tag whose version is already on PyPI.
    environment:
      name: pypi
      url: https://pypi.org/project/peercache/
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: sdist
          path: dist
      - name: Publish
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist
          skip-existing: true
